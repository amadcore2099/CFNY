<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ======================================== -->
  <!-- META                                     -->
  <!-- ======================================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ======================================== -->
  <!-- TITLE                                    -->
  <!-- ======================================== -->
  <title>Capital Flight — Label</title>

  <!-- ======================================== -->
  <!-- FONTS / STYLES                           -->
  <!-- ======================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body data-page="label">

  <!-- ======================================== -->
  <!-- SITE HEADER                              -->
  <!-- ======================================== -->
  <header class="site-header">
    <div class="header-inner">

      <!-- Logo -->
      <a class="brand" href="index.html" aria-label="Capital Flight home">
        <img src="images/logo.png" alt="Capital Flight">
      </a>

      <!-- Navigation -->
      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="production.html">Production</a>
        <a href="marketing.html">Marketing</a>
        <a href="label.html">Label</a>
        <a href="about.html">About</a>
      </nav>

    </div>
  </header>


  <!-- ======================================== -->
  <!-- PAGE CONTENT                             -->
  <!-- ======================================== -->
  <main class="page" id="top">

    <!-- Page Intro -->
    <section class="intro">
      <h1 class="intro-title">LABEL</h1>
      <p class="intro-copy">
        Selected label releases organised by year.
      </p>
    </section>


    <!-- ======================================== -->
    <!-- VIDEO ARCHIVE                            -->
    <!-- ======================================== -->

    <!-- 2025 -->
    <section class="archive-year" data-year="2025">
      <h2 class="year-label">2025</h2>
      <div class="project-grid"></div>
    </section>

    <!-- 2024 -->
    <section class="archive-year" data-year="2024">
      <h2 class="year-label">2024</h2>
      <div class="project-grid"></div>
    </section>

    <!-- 2023 -->
    <section class="archive-year" data-year="2023">
      <h2 class="year-label">2023</h2>
      <div class="project-grid"></div>
    </section>

  </main>


  <!-- ======================================== -->
  <!-- FOOTER                                   -->
  <!-- ======================================== -->
  <footer class="footer">
    Capital Flight — Label
  </footer>


  <!-- ======================================== -->
  <!-- VIDEO LIGHTBOX                           -->
  <!-- ======================================== -->
  <div class="video-lightbox" id="videoLightbox" aria-hidden="true">
    <div class="video-lightbox-inner">

      <button
        class="video-close"
        id="videoClose"
        aria-label="Close video">
        ✕
      </button>

      <div class="video-frame-wrap" id="videoFrameWrap">
        <div class="video-poster" id="videoPoster"></div>
      </div>

      <div class="video-fallback" id="videoFallback"></div>

    </div>
  </div>


  <!-- ======================================== -->
  <!-- SCRIPTS                                  -->
  <!-- ======================================== -->
  <script src="app.js"></script>

</body>
</html>
